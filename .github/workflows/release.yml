name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Linux (Ubuntu 22.04)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev libsqlite3-dev \
            libvte-2.91-dev libwebkit2gtk-4.1-dev

      - name: Check glibc version
        run: make check-glibc

      - name: Build
        run: |
          make clean
          make

      - name: Package tarball
        run: |
          STAGE="opentool-linux-x86_64"
          mkdir -p "$STAGE"
          cp opentool "$STAGE/"
          cp logo-512.png README.md LICENSE "$STAGE/" 2>/dev/null || true
          tar czf "${STAGE}.tar.gz" "$STAGE"
          ls -lah "${STAGE}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: opentool-linux-x86_64.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-linux]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          mkdir -p release
          find artifacts -type f -name '*.tar.gz' -exec cp {} release/ \;
          ls -lah release/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            release/*
