name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-macos-arm:
    name: Build macOS (arm64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install gtk+3 sqlite pkg-config

      - name: Build app bundle
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          export PKG_CONFIG_PATH="$(brew --prefix sqlite)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          make clean
          make app-bundle

      - name: Package zip
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "Config Opener.app" "Config-Opener-macOS-arm64.zip"
          ls -lah Config-Opener-macOS-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: Config-Opener-macOS-arm64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux (Ubuntu 22.04, glibc)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev libsqlite3-dev

      - name: Build
        run: |
          make clean
          make

      - name: Package tarball
        run: |
          STAGE="config-opener-linux-x86_64"
          mkdir -p "$STAGE"
          cp config-opener "$STAGE/"
          cp logo-512.png "$STAGE/"
          cp README.md LICENSE "$STAGE/" 2>/dev/null || true
          tar czf "${STAGE}.tar.gz" "$STAGE"
          ls -lah "${STAGE}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: config-opener-linux-x86_64.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-macos-arm, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' \) \
            -exec cp {} release/ \;
          ls -lah release/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            release/*
